<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #FFF9E1; text-align: center; padding: 20px; margin: 0; }
    .unit-card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 350px; margin: 20px auto; position: relative; z-index: 1; }
    .kiwi-img { width: 100px; height: 100px; transition: 0.3s; margin-bottom: 10px; cursor: pointer; border-radius: 50%; background: #FFE082; object-fit: contain; }
    .btn-mic { display: block; width: 80%; margin: 20px auto; background: #FF5A5A; color: white; border: none; padding: 18px 0; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; box-shadow: 0 6px #d32f2f; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    .btn-mic:active { transform: translateY(3px); box-shadow: 0 2px #d32f2f; }
    .btn-recording { background: #4CAF50 !important; box-shadow: 0 6px #388E3C !important; }
    .star-display { font-size: 40px; color: #FFD700; height: 50px; margin: 10px 0; }
    .target-sentence { font-size: 18px; color: #4A90E2; font-weight: bold; margin: 15px 0; background: #EBF4FF; padding: 12px; border-radius: 15px; }
    .chat-container { text-align: left; margin-top: 15px; padding: 15px; background: #fdfdfd; border-radius: 15px; border: 1px dashed #ccc; }
    .label { font-weight: bold; font-size: 12px; color: #999; margin-bottom: 5px; display: block; }
    .student-text { color: #3498db; font-size: 18px; font-weight: 500; margin-bottom: 10px; min-height: 24px; border-bottom: 1px solid #eee; }
    .kiwi-text { color: #e67e22; font-size: 16px; line-height: 1.4; min-height: 20px; }
    #msg { color: #FF5A5A; font-size: 13px; margin: 15px 0; font-weight: bold; min-height: 18px; }
  </style>
</head>
<body>

  <div class="unit-card">
    <img id="kiwi" class="kiwi-img" src="https://cdn-icons-png.flaticon.com/512/826/826913.png" onclick="repeatKiwi()">
    <div id="stars" class="star-display"></div>
    
    <div class="target-sentence">挑戰句子：<br>"My eye hurts."</div>
    
    <div class="chat-container">
      <span class="label">🎤 你說的是：</span>
      <div id="display-text" class="student-text">...</div>
      
      <span class="label">👩‍🏫 Kiwi 老師說：</span>
      <div id="feedback" class="kiwi-text">請按下方按鈕開始</div>
    </div>

    <p id="msg">正在初始化...</p>
    
    <button id="mainBtn" class="btn-mic" onclick="handleMicClick()">🎤 開始錄音</button>
  </div>

  <script>
    // 🚀 【重要】請在此處貼上你部署後的 Web App URL (以 /exec 結尾)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxv1fIvykOCq0u-Xisrn_f1NwXtJYaA5vRzLG-IHujT-WPkxqHGSrSKadEDLpg1YzHy/exec";

    async function requestMicrophoneEarly() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        console.log("硬體麥克風授權成功");
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('msg').innerText = "準備就緒";
      } catch (err) {
        console.warn("麥克風預請求被拒絕:", err);
        document.getElementById('msg').innerHTML = "請點擊網址旁『鎖頭』允許麥克風";
      }
    }
    requestMicrophoneEarly();

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;
    let isRecording = false;

    if (SpeechRecognition) {
      recognition = new SpeechRecognition();
      recognition.lang = 'en-US';
      recognition.interimResults = false;
      recognition.continuous = false;
    }

    function speak(text) {
      if (!text) return;
      window.speechSynthesis.cancel();
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = 'en-US';
      utterance.pitch = 1.2;
      utterance.rate = 0.85;
      window.speechSynthesis.speak(utterance);
    }

    function handleMicClick() {
      if (!recognition) {
        alert("此瀏覽器不支援語音功能");
        return;
      }
      if (isRecording) {
        recognition.stop();
      } else {
        startRecording();
      }
    }

    function startRecording() {
      window.speechSynthesis.speak(new SpeechSynthesisUtterance(""));
      document.getElementById('msg').innerText = "正在聽...";
      document.getElementById('display-text').innerText = "...";
      try {
        recognition.start();
      } catch (e) {
        recognition.stop();
        setTimeout(() => { recognition.start(); }, 250);
      }
    }

    if (recognition) {
      recognition.onstart = function() {
        isRecording = true;
        const btn = document.getElementById('mainBtn');
        btn.innerText = "🛑 停止錄音";
        btn.classList.add('btn-recording');
      };

      recognition.onend = function() {
        isRecording = false;
        const btn = document.getElementById('mainBtn');
        btn.innerText = "🎤 開始錄音";
        btn.classList.remove('btn-recording');
      };

      recognition.onresult = async function(event) {
        const text = event.results[0][0].transcript;
        document.getElementById('display-text').innerText = text;
        document.getElementById('msg').innerText = "Kiwi 老師批改中...";
        
        // 🚀 使用 fetch 發送到 GAS
        try {
          const response = await fetch(GAS_URL, {
            method: "POST",
            body: JSON.stringify({
              text: text,
              unit: "Body Parts"
            })
          });

          // 獲取 GAS 回傳的 JSON 資料
          const data = await response.json();
          
          document.getElementById('msg').innerText = "評分完成";
          document.getElementById('stars').innerText = "⭐".repeat(data.score || 0);
          document.getElementById('feedback').innerText = data.feedback;
          speak(data.feedback);
          
        } catch (err) {
          console.error("連線錯誤:", err);
          document.getElementById('msg').innerText = "批改完成 (請檢查 GAS 回傳或 CORS 設定)";
          
          // 💡 註：本地檔案存取 GAS 有時會遇到 CORS 阻擋
          // 如果看到「連線失敗」但 GAS 端有跑，代表我們該搬家到 GitHub 了！
        }
      };

      recognition.onerror = function(event) {
        isRecording = false;
        if (event.error === 'not-allowed') {
          document.getElementById('msg').innerHTML = "<span style='color:red'>權限被擋！請開啟麥克風。</span>";
        } else {
          document.getElementById('msg').innerText = "錄音錯誤: " + event.error;
        }
      };
    }

    function repeatKiwi() {
      const feedback = document.getElementById('feedback').innerText;
      if (feedback && feedback.length > 5) speak(feedback);
    }
  </script>
</body>
</html>
