<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw9fFty0TC0NqhZ6mK7jSJD6_g-0cYeqOA6CHqoHTwdJkQu7WxvAWT-J92RJgtNFpvU/exec";

    let currentStudent = null;
    let currentTextbook = null;
    let currentTarget = "";

    async function handleLogin() {
        const name = document.getElementById('stuName').value.trim();
        const phone = document.getElementById('stuPhone').value.trim();
        const status = document.getElementById('login-status');

        if (!name || !phone) {
            status.innerText = "Please fill in both name and phone.";
            return;
        }

        status.innerText = "Logging in... Please wait.";
        
        try {
            const resp = await fetch(`${GAS_URL}?action=login&name=${name}&phone=${phone}`);
            const data = await resp.json();

            if (data.success) {
                currentStudent = data.student;
                currentTextbook = data.textbook || data; 
                showMain();
            } else {
                status.innerText = "❌ " + data.msg;
            }
        } catch (e) {
            status.innerText = "❌ Connection Error. Please try again.";
        }
    }

   function showMain() {
        // 🚀 強力檢測：如果沒有資料，就不執行
        if (!currentStudent || !currentTextbook) {
            console.error("Missing data:", { student: currentStudent, book: currentTextbook });
            return;
        }

        document.getElementById('login-container').style.display = 'none';
        document.getElementById('main-container').style.display = 'flex';
        
        document.getElementById('welcome-msg').innerText = `Hi, ${currentStudent.name}!`;
        
        // 🚀 修正：資料可能在 currentTextbook 裡，也可能在 currentTextbook.textbook 裡
        const book = currentTextbook.textbook ? currentTextbook.textbook : currentTextbook;
        const options = currentTextbook.allOptions || [];

        document.getElementById('unit-info').innerText = `Level ${currentStudent.level} : ${book.unit || ""} - ${book.page || ""}`;
        
        const controlArea = document.getElementById('control-area');
        const teacherBox = document.getElementById('teacher-level-box');
        
        controlArea.style.display = 'block'; 
        if (currentStudent.role === "Teacher") {
            teacherBox.style.display = 'block'; 
            document.getElementById('levelSelect').value = currentStudent.level.replace("K", "");
        } else {
            teacherBox.style.display = 'none';
        }

        // 1. 更新選單 (Lesson Select)
        const lessonSelect = document.getElementById('lessonSelect');
        if (options.length > 0) {
            lessonSelect.innerHTML = "";
            options.forEach(opt => {
                const el = document.createElement("option");
                el.value = opt.value;
                el.innerText = opt.label;
                lessonSelect.appendChild(el);
            });
            // 設定目前選中的項目
            lessonSelect.value = `${book.unit}|${book.page}`;
        }

        // 2. 更新課本圖檔
        const bookImg = document.getElementById('bookImg');
        if (book.imageUrl) {
            bookImg.src = book.imageUrl;
            bookImg.onerror = () => { bookImg.src = "https://placehold.co/600x400?text=Image+Not+Found"; };
        }

        // 3. 生成單字按鈕 (處理對應音檔)
        const wordArea = document.getElementById('wordList');
        wordArea.innerHTML = book.words ? "<p style='font-size:12px; color:#999; margin:5px 0;'>Words:</p>" : "";
        if (book.words) {
            const words = String(book.words).split(',').map(s => s.trim());
            const audios = (book.wordAudio || "").split(',').map(s => s.trim());
            
            words.forEach((w, index) => {
                const btn = document.createElement("button");
                btn.className = "btn-sample";
                btn.innerText = w;
                btn.onclick = () => {
                    currentTarget = w;
                    document.getElementById('targetSentence').innerText = `"${currentTarget}"`;
                    playSpecificAudio(audios[index], w);
                };
                wordArea.appendChild(btn);
            });
        }

        // 4. 生成句型按鈕 (處理對應音檔)
        const sentArea = document.getElementById('sentenceList');
        sentArea.innerHTML = book.sentences ? "<p style='font-size:12px; color:#999; margin:5px 0;'>Sentences:</p>" : "";
        if (book.sentences) {
            const sents = String(book.sentences).split('|').map(s => s.trim());
            const audios = (book.sentAudio || "").split('|').map(s => s.trim());
            
            sents.forEach((s, index) => {
                if(!s) return;
                const btn = document.createElement("button");
                btn.className = "btn-sent";
                btn.innerText = s;
                btn.onclick = () => {
                    currentTarget = s;
                    document.getElementById('targetSentence').innerText = `"${currentTarget}"`;
                    playSpecificAudio(audios[index], s);
                };
                sentArea.appendChild(btn);
            });
        }
    }

    // 🚀 修正後的音檔播放邏輯
    function playSpecificAudio(url, backupText) {
        if (url && url !== "NONE" && url.startsWith("http")) {
            const audio = new Audio(url);
            audio.play().catch(e => speakText(backupText));
        } else {
            speakText(backupText);
        }
    }

    async function changeUnit(isLevelChange = false) {
        let level;
        if (currentStudent.role === "Teacher") {
            level = "K" + document.getElementById('levelSelect').value;
        } else {
            level = currentStudent.level;
        }

        let selectedUnit = "", selectedPage = "";
        if (!isLevelChange) {
            const combinedValue = document.getElementById('lessonSelect').value;
            if (combinedValue.includes('|')) {
                [selectedUnit, selectedPage] = combinedValue.split('|');
            }
        }
        
        document.getElementById('status-msg').innerText = `Loading ${level}...`;
        
        try {
            const resp = await fetch(`${GAS_URL}?action=getTeacherData&unit=${encodeURIComponent(selectedUnit)}&page=${encodeURIComponent(selectedPage)}&level=${level}`);
            const data = await resp.json();
            
            if (data.success) {
                currentTextbook = data;
                showMain();
                document.getElementById('status-msg').innerText = "Loaded!";
            }
        } catch (e) {
            document.getElementById('status-msg').innerText = "Load Failed!";
        }
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    const recognition = new SpeechRecognition();
    recognition.lang = 'en-US';

    function toggleRecognition() {
        try {
            recognition.start();
            document.getElementById('mainBtn').innerText = "🛑 LISTENING...";
            document.getElementById('status-msg').innerText = "Kiwi is listening...";
        } catch (e) { console.error(e); }
    }

    recognition.onresult = async (event) => {
        const transcript = event.results[0][0].transcript;
        document.getElementById('status-msg').innerText = "You said: " + transcript;
        
        const params = new URLSearchParams({
            action: "processSpeech",
            studentText: transcript,
            target: currentTarget || "Hello",
            name: currentStudent ? currentStudent.name : "Student"
        });

        try {
            const resp = await fetch(`${GAS_URL}?${params.toString()}`);
            const data = await resp.json();
            
            document.getElementById('feedback').innerText = data.feedback + (data.translation ? "\n" + data.translation : "");
            if (data.score >= 4) confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            
            if (data.audio) {
                new Audio("data:audio/mp3;base64," + data.audio).play();
            }
        } catch (e) {
            document.getElementById('feedback').innerText = "Kiwi had a tiny glitch! Try again.";
        }
        document.getElementById('mainBtn').innerText = "🎤 START";
    };

    function speakText(text) {
        window.speechSynthesis.cancel();
        const utt = new SpeechSynthesisUtterance(text);
        utt.lang = 'en-US';
        window.speechSynthesis.speak(utt);
    }
</script>
