<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #FFF9E1; margin: 0; padding: 20px; display: flex; justify-content: center; }
    .main-container { display: flex; flex-direction: row; gap: 20px; max-width: 1200px; width: 100%; background: white; padding: 20px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    .ebook-section { flex: 1.5; position: relative; }
    .ebook-img { width: 100%; border-radius: 15px; border: 3px solid #FFE082; display: block; height: auto; }
    .control-section { flex: 1; display: flex; flex-direction: column; gap: 12px; min-width: 300px; background: #FFFEF5; padding: 15px; border-radius: 20px; }
    
    /* 模式切換按鈕樣式 */
    .mode-switch { display: flex; gap: 10px; margin-bottom: 5px; }
    .btn-mode { flex: 1; padding: 10px; border-radius: 12px; border: 2px solid #ddd; background: white; color: #666; font-weight: bold; cursor: pointer; transition: 0.3s; }
    .btn-mode.active { border-color: #4A90E2; background: #EBF4FF; color: #4A90E2; }
    .btn-mode.game-active { border-color: #FF9800; background: #FFF3E0; color: #E65100; }

    select { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #FF5A5A; font-size: 16px; font-weight: bold; color: #d32f2f; cursor: pointer; }
    .practice-area { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .btn-sample { background: white; color: #4A90E2; border: 2px solid #4A90E2; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-sentence { border-color: #FF5A5A; color: #FF5A5A; }
    
    .target-sentence { font-size: 20px; color: #2C3E50; font-weight: bold; padding: 10px; border-bottom: 2px dashed #FFE082; min-height: 30px; }
    .feedback-box { display: flex; align-items: flex-start; gap: 10px; background: white; padding: 15px; border-radius: 15px; border-left: 6px solid #FFE082; min-height: 80px; }
    .kiwi-avatar { width: 60px; height: 60px; cursor: pointer; }
    .kiwi-text { color: #e67e22; font-size: 16px; text-align: left; line-height: 1.4; white-space: pre-line; }

    .btn-mic { width: 100%; background: #FF5A5A; color: white; border: none; padding: 18px; border-radius: 50px; font-size: 22px; font-weight: bold; box-shadow: 0 6px #d32f2f; cursor: pointer; }
    .btn-recording { background: #4CAF50 !important; box-shadow: 0 6px #388E3C !important; }
    #status-msg { color: #95a5a6; font-size: 14px; font-style: italic; }

    @media (max-width: 850px) {
      .main-container { flex-direction: column; padding: 10px; }
      .ebook-section { order: 1; }
      .control-section { order: 2; min-width: unset; }
    }
  </style>
</head>
<body>

<div class="main-container">
  <div class="ebook-section">
    <img id="bookImg" class="ebook-img" src="2.jpg">
  </div>

  <div class="control-section">
    <select id="unitSelect" onchange="loadPage()">
      <optgroup label="Unit 1: What's the Matter?">
        <option value="U1_P2">U1 P.2 - Body Parts</option>
        <option value="U1_P4">U1 P.4 - Let's Sing</option>
        <option value="U1_P6">U1 P.6 - Jobs</option>
        <option value="U1_P8">U1 P.8 - Practice</option>
      </optgroup>
      <optgroup label="Unit 2: What Day Is Today?">
        <option value="U2_P10">U2 P.10 - Let's Talk</option>
        <option value="U2_P12">U2 P.12 - Let's Sing</option>
        <option value="U2_P14">U2 P.14 - Let's Learn</option>
        <option value="U2_P16">U2 P.16 - Practice</option>
      </optgroup>
    </select>

    <div class="mode-switch">
      <button id="btnPractice" class="btn-mode active" onclick="setMode('correction')">📖 練習</button>
      <button id="btnGame" class="btn-mode" onclick="setMode('game')">🎮 遊戲</button>
    </div>

    <div id="targetSentence" class="target-sentence">Ready to learn?</div>
    <div id="wordList" class="practice-area"></div>

    <div class="feedback-box">
      <img class="kiwi-avatar" src="https://cdn-icons-png.flaticon.com/512/826/826913.png" onclick="repeatKiwi()">
      <div id="feedback" class="kiwi-text">Pick a word to start!</div>
    </div>

    <div id="status-msg">Waiting...</div>
    <button id="mainBtn" class="btn-mic" onclick="handleMicClick()">🎤 START CHALLENGE</button>
  </div>
</div>

<script>
  const GAS_URL = "https://script.google.com/macros/s/AKfycbyu-mX-oQHdGajSSAMHqJSGeIjmA1hRY-SrYaH1As-NjJCq0DTTSt0UMWiNsoWFt4ej/exec";

  const bookData = {
    "U1_P2": { img: "2.jpg", words: ["Eye", "Ear", "Nose", "Mouth", "Head"], sentences: ["My eye hurts."] },
    "U1_P4": { img: "4.jpg", words: ["Doctor", "Nurse", "Patient"], sentences: ["I am a doctor."] },
    "U1_P6": { img: "6.jpg", words: ["Student", "Teacher", "Cook", "Driver"], sentences: ["Are you a doctor?"] },
    "U1_P8": { img: "8.jpg", words: ["Ambulance", "Mail carrier"], sentences: ["Is he a doctor?"] },
    "U2_P10": { img: "10.jpg", words: ["Sunday", "Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"], sentences: ["What day is today?"] },
    "U2_P12": { img: "12.jpg", words: ["Walk", "Run", "Hop", "Jump"], sentences: ["We have no time to play."] },
    "U2_P14": { img: "14.jpg", words: ["Skate", "Ski", "Sing", "Dance", "Swim"], sentences: ["I can skate."] },
    "U2_P16": { img: "16.jpg", words: ["Kite"], sentences: ["Can you fly a kite?"] }
  };

  let currentTarget = "";
  let currentMode = "correction"; // 'correction' 或 'game'

  function setMode(mode) {
    currentMode = mode;
    const pBtn = document.getElementById('btnPractice');
    const gBtn = document.getElementById('btnGame');
    
    if (mode === 'game') {
      gBtn.classList.add('game-active'); pBtn.classList.remove('active');
      document.getElementById('wordList').innerHTML = ""; // 遊戲模式隱藏單字按鈕
      document.getElementById('targetSentence').innerText = "🎮 Game Mode!";
      document.getElementById('feedback').innerText = "Say 'Hello Kiwi' to start the game!";
    } else {
      pBtn.classList.add('active'); gBtn.classList.remove('game-active');
      loadPage();
    }
  }

  function loadPage() {
    const key = document.getElementById('unitSelect').value;
    const data = bookData[key];
    document.getElementById('bookImg').src = data.img;
    if (currentMode === 'game') return;

    const listDiv = document.getElementById('wordList');
    listDiv.innerHTML = "";
    data.words.forEach(w => {
      const btn = document.createElement("button");
      btn.className = "btn-sample"; btn.innerText = w;
      btn.onclick = () => playSample(w);
      listDiv.appendChild(btn);
    });
    data.sentences.forEach(s => {
      const btn = document.createElement("button");
      btn.className = "btn-sample btn-sentence"; btn.innerText = "Sentence 🗣️";
      btn.onclick = () => playSample(s);
      listDiv.appendChild(btn);
    });
    document.getElementById('targetSentence').innerText = "Select an item";
  }

  function playSample(text) {
    currentTarget = text;
    document.getElementById('targetSentence').innerText = `"${text}"`;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US'; utt.rate = 0.8;
    window.speechSynthesis.speak(utt);
  }

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  const recognition = new SpeechRecognition();
  recognition.lang = 'en-US';

  function handleMicClick() {
    if (document.getElementById('mainBtn').innerText.includes("START")) {
      window.speechSynthesis.cancel();
      recognition.start();
    } else {
      recognition.stop();
    }
  }

  recognition.onstart = () => {
    document.getElementById('mainBtn').innerText = "🛑 STOP";
    document.getElementById('mainBtn').classList.add('btn-recording');
    document.getElementById('status-msg').innerText = "Listening...";
  };

  recognition.onend = () => {
    document.getElementById('mainBtn').innerText = "🎤 START CHALLENGE";
    document.getElementById('mainBtn').classList.remove('btn-recording');
  };

  recognition.onresult = async (event) => {
    const result = event.results[0][0].transcript;
    document.getElementById('status-msg').innerText = "Kiwi is thinking...";
    
    try {
      const resp = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ 
          target: currentTarget, 
          studentText: result, 
          mode: currentMode,
          unit: document.getElementById('unitSelect').value 
        })
      });
      const data = await resp.json();
      const parts = data.feedback.split('|');
      document.getElementById('feedback').innerText = parts[0] + (parts[1] ? "\n" + parts[1].trim() : "");
      
      const utt = new SpeechSynthesisUtterance(parts[0]);
      utt.lang = 'en-US'; window.speechSynthesis.speak(utt);
      document.getElementById('status-msg').innerText = "Score: " + "⭐".repeat(data.score);
    } catch (e) {
      document.getElementById('status-msg').innerText = "Connection Error.";
    }
  };

  function repeatKiwi() {
    const text = document.getElementById('feedback').innerText.split('\n')[0];
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = 'en-US'; window.speechSynthesis.speak(utt);
  }

  loadPage();
</script>

</body>
</html>
