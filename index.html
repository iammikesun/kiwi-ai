<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #FFF9E1; text-align: center; padding: 15px; margin: 0; }
    .unit-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); max-width: 400px; margin: 0 auto; }
    
    /* 電子書圖片區 */
    .ebook-view { width: 100%; border-radius: 15px; border: 2px solid #FFE082; margin-bottom: 10px; overflow: hidden; position: relative; }
    .ebook-img { width: 100%; display: block; }
    
    /* 點擊練習按鈕區 */
    .practice-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .btn-sample { background: #EBF4FF; color: #4A90E2; border: 1px solid #4A90E2; padding: 8px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
    .btn-sample:active { background: #4A90E2; color: white; }

    .kiwi-img { width: 80px; height: 80px; border-radius: 50%; background: #FFE082; margin-bottom: 10px; }
    .btn-mic { display: block; width: 100%; background: #FF5A5A; color: white; border: none; padding: 15px 0; border-radius: 50px; font-size: 20px; font-weight: bold; box-shadow: 0 6px #d32f2f; cursor: pointer; }
    .btn-recording { background: #4CAF50 !important; box-shadow: 0 6px #388E3C !important; }
    .target-sentence { font-size: 18px; color: #4A90E2; font-weight: bold; margin: 10px 0; min-height: 40px; }
    .kiwi-text { color: #e67e22; font-size: 16px; min-height: 20px; margin-top: 10px; text-align: left; background: #f9f9f9; padding: 10px; border-radius: 10px; }
    #msg { color: #FF5A5A; font-size: 12px; margin-top: 5px; }
  </style>
</head>
<body>

<div class="unit-card">
  <select id="unitSelect" style="width:100%; padding:10px; margin-bottom:10px; border-radius:10px;" onchange="loadPage()">
    <option value="U1_P2">Unit 1 P.2 - What's the Matter?</option>
    <option value="U1_P4">Unit 1 P.4 - I am a Doctor.</option>
  </select>

  <div class="ebook-view">
    <img id="bookImg" class="ebook-img" src="2.jpg"> </div>

  <div id="wordList" class="practice-area">
    </div>

  <div id="targetSentence" class="target-sentence">點擊上方單字開始練習</div>

  <img class="kiwi-img" src="https://cdn-icons-png.flaticon.com/512/826/826913.png" onclick="repeatKiwi()">
  <div id="feedback" class="kiwi-text">跟著 Kiwi 老師讀單字！</div>
  
  <p id="msg">等待指令...</p>
  <button id="mainBtn" class="btn-mic" onclick="handleMicClick()">🎤 開始錄音挑戰</button>
</div>

<script>
  const GAS_URL = "你的_GAS_URL_貼在這裡";

  // 🌟 電子書資料庫
  const bookData = {
    "U1_P2": {
      img: "2.jpg", // 記得確認 GitHub 上圖片檔名
      words: ["Eye", "Ear", "Nose", "Mouth", "Hurts"],
      sentences: ["My eye hurts.", "What's the matter?"]
    },
    "U1_P4": {
      img: "4.jpg",
      words: ["Doctor", "Nurse", "Patient"],
      sentences: ["I am a doctor.", "You are a nurse."]
    }
  };

  let currentTarget = "";

  // 🌟 初始化頁面
  function loadPage() {
    const pageKey = document.getElementById('unitSelect').value;
    const data = bookData[pageKey];
    
    // 換圖片
    document.getElementById('bookImg').src = data.img;
    
    // 換單字按鈕
    const listDiv = document.getElementById('wordList');
    listDiv.innerHTML = ""; // 清空
    
    // 加入單字按鈕
    data.words.forEach(w => {
      let btn = document.createElement("button");
      btn.className = "btn-sample";
      btn.innerText = w;
      btn.onclick = () => playSample(w, "word");
      listDiv.appendChild(btn);
    });

    // 加入句子按鈕
    data.sentences.forEach(s => {
      let btn = document.createElement("button");
      btn.className = "btn-sample";
      btn.style.borderColor = "#FF5A5A"; // 句子用不同顏色區分
      btn.innerText = "唸句子";
      btn.onclick = () => playSample(s, "sentence");
      listDiv.appendChild(btn);
    });
  }

  // 🌟 點擊發音
  function playSample(text, type) {
    currentTarget = text; // 設定當前 AI 要檢查的目標
    document.getElementById('targetSentence').innerHTML = "跟著讀：<br>\"" + text + "\"";
    
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    utterance.rate = 0.7; // 慢速示範
    window.speechSynthesis.speak(utterance);
    
    document.getElementById('msg').innerText = "聽完示範後，按下方錄音";
  }

  // --- 語音辨識與 GAS 通訊部分 ---
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition = new SpeechRecognition();
  recognition.lang = 'en-US';

  function handleMicClick() {
    if (document.getElementById('mainBtn').innerText.includes("錄音")) {
      startRecording();
    } else {
      recognition.stop();
    }
  }

  function startRecording() {
    document.getElementById('msg').innerText = "錄音中...請讀出：" + currentTarget;
    recognition.start();
  }

  recognition.onstart = () => {
    document.getElementById('mainBtn').innerText = "🛑 停止";
    document.getElementById('mainBtn').classList.add('btn-recording');
  };

  recognition.onend = () => {
    document.getElementById('mainBtn').innerText = "🎤 開始錄音挑戰";
    document.getElementById('mainBtn').classList.remove('btn-recording');
  };

  recognition.onresult = async (event) => {
    const speechResult = event.results[0][0].transcript;
    document.getElementById('msg').innerText = "Kiwi 老師正在聽你的發音...";
    
    // 🌟 發送到 GAS，讓 AI 針對 currentTarget (正確答案) 與 speechResult (學生讀的) 做比較
    try {
      const response = await fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          target: currentTarget, 
          studentText: speechResult,
          mode: "correction" // 告訴 AI 現在是糾音模式
        })
      });
      const data = await response.json();
      
      const parts = data.feedback.split('|');
      document.getElementById('feedback').innerText = parts[0] + "\n" + (parts[1] || "");
      
      // 只唸英文評語
      const utterance = new SpeechSynthesisUtterance(parts[0]);
      utterance.lang = 'en-US';
      window.speechSynthesis.speak(utterance);
      
    } catch (e) {
      document.getElementById('msg').innerText = "連線失敗";
    }
  };

  function repeatKiwi() {
    const text = document.getElementById('feedback').innerText.split('\n')[0];
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'en-US';
    window.speechSynthesis.speak(utterance);
  }

  // 頁面載入後先跑一次
  loadPage();
</script>

</body>
</html>
